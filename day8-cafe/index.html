<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .product{
            border: 1px solid;
            border-color: brown;
            width: 180px;
            text-align: center;
            border-radius: 12px;
             padding: 12px;
             margin: 10px;
             background-color: brown;
             box-shadow: 3px 5px 8px rgb(183, 79, 96);
        }
        .product:hover{
            box-shadow: 5px 5px 15px rgb(97, 54, 225);
            transition: 2s;
        }
        
        .product img{
            width: 100%;
            height: 100px;
            border-radius: 12px;
            background-color: brown;
            border: 2px solid;
            border-color: white;
        }
        .product button{
            color: black;
            background-color: orange;
        }
        .product strong{
            color: white;
        }
        .product p{
            color: white;
        }
        body{
            display: flex;
            flex-wrap: wrap;
        }

      
    </style>

</head>
<body>
    
    <div class="product">
        <img src="https://images.pexels.com/photos/20204675/pexels-photo-20204675.jpeg" >
        <strong>Coffee</strong>
        <p>$120.00</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/3250406/pexels-photo-3250406.jpeg">
        <strong>cookiee</strong>
        <p>$100.00</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/8964308/pexels-photo-8964308.jpeg">
        <strong>Cup Cake</strong>
        <p>$280.00</p>
        <button>Buy Now</button>
    </div>

    <div class="product">
        <img src="https://images.pexels.com/photos/34541593/pexels-photo-34541593.jpeg">
        <strong>Cold Coffee</strong>
        <p>$130.00</p>
        <button>Buy Now</button>
    </div>
</body>
</html>
